<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS Gradient Generator - DevToolbox</title>
  <meta name="description" content="Generate beautiful CSS gradients with a visual editor. Linear, radial, and conic gradients.">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --primary: #6366f1;
      --primary-dark: #4f46e5;
      --bg: #0f172a;
      --bg-card: #1e293b;
      --bg-input: #0f172a;
      --text: #f1f5f9;
      --text-muted: #94a3b8;
      --border: #334155;
      --success: #10b981;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }
    .container { max-width: 1200px; margin: 0 auto; padding: 20px; }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--border);
    }
    .logo {
      font-size: 1.2rem;
      font-weight: 600;
      color: var(--text);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .back-link {
      color: var(--text-muted);
      text-decoration: none;
      font-size: 0.9rem;
    }
    .back-link:hover { color: var(--primary); }

    .layout {
      display: grid;
      grid-template-columns: 350px 1fr;
      gap: 20px;
    }
    @media (max-width: 900px) {
      .layout { grid-template-columns: 1fr; }
    }

    .panel {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
    }
    .panel-title {
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 16px;
    }

    .preview {
      width: 100%;
      height: 300px;
      border-radius: 12px;
      margin-bottom: 20px;
      border: 1px solid var(--border);
    }

    .control-group {
      margin-bottom: 20px;
    }
    .control-label {
      display: block;
      font-size: 0.85rem;
      color: var(--text-muted);
      margin-bottom: 8px;
    }

    select, input[type="text"], input[type="number"] {
      width: 100%;
      padding: 10px 12px;
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 0.9rem;
    }
    select:focus, input:focus {
      outline: none;
      border-color: var(--primary);
    }

    .color-stops {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .color-stop {
      display: flex;
      gap: 10px;
      align-items: center;
      padding: 10px;
      background: var(--bg);
      border-radius: 8px;
    }
    .color-stop input[type="color"] {
      width: 40px;
      height: 40px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      padding: 0;
    }
    .color-stop input[type="range"] {
      flex: 1;
    }
    .color-stop .position-value {
      width: 50px;
      text-align: center;
      font-size: 0.85rem;
      color: var(--text-muted);
    }
    .color-stop .remove-btn {
      padding: 6px 10px;
      background: #ef4444;
      border: none;
      border-radius: 4px;
      color: white;
      cursor: pointer;
      font-size: 0.8rem;
    }

    .add-color-btn {
      width: 100%;
      padding: 10px;
      background: transparent;
      border: 1px dashed var(--border);
      border-radius: 6px;
      color: var(--text-muted);
      cursor: pointer;
      margin-top: 10px;
    }
    .add-color-btn:hover {
      border-color: var(--primary);
      color: var(--primary);
    }

    .angle-control {
      display: flex;
      gap: 10px;
      align-items: center;
    }
    .angle-control input[type="range"] {
      flex: 1;
    }
    .angle-value {
      width: 60px;
      text-align: center;
    }

    .output {
      background: var(--bg);
      border-radius: 8px;
      padding: 16px;
      margin-top: 20px;
    }
    .output-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }
    .output-title {
      font-size: 0.85rem;
      color: var(--text-muted);
    }
    .copy-btn {
      padding: 6px 12px;
      background: var(--primary);
      border: none;
      border-radius: 4px;
      color: white;
      cursor: pointer;
      font-size: 0.8rem;
    }
    .copy-btn:hover { background: var(--primary-dark); }

    .code-output {
      font-family: 'Monaco', 'Menlo', monospace;
      font-size: 0.85rem;
      color: var(--text);
      white-space: pre-wrap;
      word-break: break-all;
    }

    .presets {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin-top: 20px;
    }
    .preset {
      height: 60px;
      border-radius: 8px;
      cursor: pointer;
      border: 2px solid transparent;
      transition: border-color 0.2s;
    }
    .preset:hover {
      border-color: var(--primary);
    }

    .full-preview {
      width: 100%;
      height: 400px;
      border-radius: 12px;
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <a href="/" class="logo">
        <span>🎨</span>
        <span>CSS Gradient Generator</span>
      </a>
      <a href="https://spardaa.github.io/toolbox/" class="back-link">← Back to Tools</a>
    </header>

    <div class="layout">
      <div class="panel">
        <div class="panel-title">⚙️ Settings</div>

        <div class="control-group">
          <label class="control-label">Gradient Type</label>
          <select id="gradientType" onchange="updateGradient()">
            <option value="linear">Linear</option>
            <option value="radial">Radial</option>
            <option value="conic">Conic</option>
          </select>
        </div>

        <div class="control-group" id="angleGroup">
          <label class="control-label">Angle</label>
          <div class="angle-control">
            <input type="range" id="angle" min="0" max="360" value="90" oninput="updateGradient()">
            <span class="angle-value" id="angleValue">90°</span>
          </div>
        </div>

        <div class="control-group">
          <label class="control-label">Color Stops</label>
          <div class="color-stops" id="colorStops"></div>
          <button class="add-color-btn" onclick="addColorStop()">+ Add Color</button>
        </div>
      </div>

      <div>
        <div class="panel">
          <div class="panel-title">👁️ Preview</div>
          <div class="preview" id="preview"></div>

          <div class="output">
            <div class="output-header">
              <span class="output-title">CSS Code</span>
              <button class="copy-btn" onclick="copyCode()">📋 Copy</button>
            </div>
            <div class="code-output" id="codeOutput"></div>
          </div>
        </div>

        <div class="panel" style="margin-top: 20px;">
          <div class="panel-title">🎯 Presets</div>
          <div class="presets" id="presets"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const PRESETS = [
      { name: 'Sunset', colors: ['#f093fb', '#f5576c'] },
      { name: 'Ocean', colors: ['#4facfe', '#00f2fe'] },
      { name: 'Forest', colors: ['#0ba360', '#3cba92'] },
      { name: 'Fire', colors: ['#f12711', '#f5af19'] },
      { name: 'Purple', colors: ['#667eea', '#764ba2'] },
      { name: 'Cool Blues', colors: ['#2193b0', '#6dd5ed'] },
      { name: 'Peach', colors: ['#ed4264', '#ffedbc'] },
      { name: 'Mint', colors: ['#00b09b', '#96c93d'] },
      { name: 'Night', colors: ['#232526', '#414345'] },
      { name: 'Cherry', colors: ['#eb3349', '#f45c43'] },
      { name: 'Aurora', colors: ['#00c6ff', '#0072ff', '#7c3aed'] },
      { name: 'Rainbow', colors: ['#ff0000', '#ff7f00', '#ffff00', '#00ff00', '#0000ff', '#8b00ff'] }
    ];

    let colorStops = [
      { color: '#6366f1', position: 0 },
      { color: '#a855f7', position: 100 }
    ];

    function init() {
      renderColorStops();
      renderPresets();
      updateGradient();
    }

    function renderColorStops() {
      const container = document.getElementById('colorStops');
      container.innerHTML = colorStops.map((stop, index) => `
        <div class="color-stop">
          <input type="color" value="${stop.color}" onchange="updateColor(${index}, this.value)">
          <input type="range" min="0" max="100" value="${stop.position}" oninput="updatePosition(${index}, this.value)">
          <span class="position-value">${stop.position}%</span>
          ${colorStops.length > 2 ? `<button class="remove-btn" onclick="removeColorStop(${index})">✕</button>` : ''}
        </div>
      `).join('');
    }

    function renderPresets() {
      const container = document.getElementById('presets');
      container.innerHTML = PRESETS.map((preset, index) => {
        const gradient = `linear-gradient(90deg, ${preset.colors.join(', ')})`;
        return `<div class="preset" style="background: ${gradient}" onclick="applyPreset(${index})" title="${preset.name}"></div>`;
      }).join('');
    }

    function updateGradient() {
      const type = document.getElementById('gradientType').value;
      const angle = document.getElementById('angle').value;

      document.getElementById('angleValue').textContent = angle + '°';
      document.getElementById('angleGroup').style.display = type === 'linear' ? 'flex' : 'none';

      const sortedStops = [...colorStops].sort((a, b) => a.position - b.position);
      const colorString = sortedStops.map(s => `${s.color} ${s.position}%`).join(', ');

      let gradient;
      if (type === 'linear') {
        gradient = `linear-gradient(${angle}deg, ${colorString})`;
      } else if (type === 'radial') {
        gradient = `radial-gradient(circle, ${colorString})`;
      } else {
        gradient = `conic-gradient(from ${angle}deg, ${colorString})`;
      }

      document.getElementById('preview').style.background = gradient;
      document.getElementById('codeOutput').textContent = `background: ${gradient};`;

      // Save to localStorage
      localStorage.setItem('gradient_state', JSON.stringify({
        type,
        angle,
        colorStops
      }));
    }

    function addColorStop() {
      const lastColor = colorStops[colorStops.length - 1];
      const newPosition = Math.min(lastColor.position + 25, 100);
      colorStops.push({ color: '#ffffff', position: newPosition });
      renderColorStops();
      updateGradient();
    }

    function removeColorStop(index) {
      colorStops.splice(index, 1);
      renderColorStops();
      updateGradient();
    }

    function updateColor(index, color) {
      colorStops[index].color = color;
      updateGradient();
    }

    function updatePosition(index, position) {
      colorStops[index].position = parseInt(position);
      document.querySelectorAll('.color-stop .position-value')[index].textContent = position + '%';
      updateGradient();
    }

    function applyPreset(index) {
      const preset = PRESETS[index];
      const step = 100 / (preset.colors.length - 1);
      colorStops = preset.colors.map((color, i) => ({
        color,
        position: Math.round(i * step)
      }));
      document.getElementById('gradientType').value = 'linear';
      document.getElementById('angle').value = 90;
      renderColorStops();
      updateGradient();
    }

    function copyCode() {
      const code = document.getElementById('codeOutput').textContent;
      navigator.clipboard.writeText(code).then(() => {
        const btn = document.querySelector('.copy-btn');
        btn.textContent = '✓ Copied!';
        setTimeout(() => btn.textContent = '📋 Copy', 1500);
      });
    }

    // Load saved state
    const savedState = localStorage.getItem('gradient_state');
    if (savedState) {
      try {
        const state = JSON.parse(savedState);
        colorStops = state.colorStops;
        document.getElementById('gradientType').value = state.type;
        document.getElementById('angle').value = state.angle;
      } catch (e) {}
    }

    init();
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SVG Path Editor - Visual SVG Path Builder</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #e0e0e0;
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            text-align: center;
            padding: 20px 0;
        }

        h1 {
            font-size: 2.2rem;
            background: linear-gradient(135deg, #00d4ff, #7c3aed);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }

        .subtitle {
            color: #888;
            font-size: 1rem;
        }

        .main-layout {
            display: grid;
            grid-template-columns: 1fr 380px;
            gap: 20px;
            margin-top: 20px;
        }

        .canvas-section {
            background: #2d2d44;
            border-radius: 12px;
            overflow: hidden;
        }

        .canvas-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            background: #1a1a2e;
            border-bottom: 1px solid #3d3d5c;
        }

        .canvas-title {
            font-weight: 600;
            color: #00d4ff;
        }

        .canvas-tools {
            display: flex;
            gap: 8px;
        }

        .tool-btn {
            padding: 8px 14px;
            background: #2d2d44;
            border: 1px solid #3d3d5c;
            border-radius: 6px;
            color: #e0e0e0;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.85rem;
        }

        .tool-btn:hover, .tool-btn.active {
            background: #7c3aed;
            border-color: #7c3aed;
        }

        .canvas-container {
            position: relative;
            height: 500px;
            background: #1a1a2e;
            background-image:
                linear-gradient(rgba(255,255,255,.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,.03) 1px, transparent 1px);
            background-size: 20px 20px;
            overflow: hidden;
        }

        .svg-canvas {
            width: 100%;
            height: 100%;
            cursor: crosshair;
        }

        .sidebar {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .panel {
            background: #2d2d44;
            border-radius: 12px;
            padding: 15px;
        }

        .panel-title {
            font-size: 1rem;
            font-weight: 600;
            color: #00d4ff;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .path-input {
            width: 100%;
            height: 100px;
            padding: 12px;
            border: 1px solid #3d3d5c;
            border-radius: 8px;
            background: #1a1a2e;
            color: #e0e0e0;
            font-family: 'Monaco', 'Menlo', monospace;
            font-size: 0.85rem;
            resize: none;
        }

        .path-input:focus {
            outline: none;
            border-color: #00d4ff;
        }

        .btn {
            padding: 10px 16px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 500;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #00d4ff, #7c3aed);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0, 212, 255, 0.3);
        }

        .btn-secondary {
            background: #3d3d5c;
            color: #e0e0e0;
        }

        .btn-secondary:hover {
            background: #4d4d6c;
        }

        .btn-danger {
            background: #ff5252;
            color: white;
        }

        .btn-group {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .btn-group .btn {
            flex: 1;
            min-width: 70px;
        }

        .point-list {
            max-height: 180px;
            overflow-y: auto;
        }

        .point-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 12px;
            background: #1a1a2e;
            border-radius: 6px;
            margin-bottom: 6px;
            font-size: 0.85rem;
        }

        .point-info {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .point-type {
            background: #7c3aed;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .point-coords {
            color: #888;
        }

        .point-actions button {
            background: none;
            border: none;
            color: #888;
            cursor: pointer;
            padding: 4px;
        }

        .point-actions button:hover {
            color: #ff5252;
        }

        .empty-state {
            text-align: center;
            padding: 20px;
            color: #888;
        }

        .empty-state i {
            font-size: 2rem;
            margin-bottom: 10px;
            opacity: 0.5;
        }

        .presets {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
        }

        .preset-btn {
            padding: 12px 8px;
            background: #1a1a2e;
            border: 1px solid #3d3d5c;
            border-radius: 8px;
            color: #e0e0e0;
            cursor: pointer;
            text-align: center;
            transition: all 0.3s ease;
        }

        .preset-btn:hover {
            border-color: #00d4ff;
            background: #16213e;
        }

        .preset-icon {
            font-size: 1.3rem;
            margin-bottom: 4px;
        }

        .preset-name {
            font-size: 0.75rem;
        }

        .settings-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .settings-label {
            color: #888;
            font-size: 0.9rem;
        }

        .settings-input {
            padding: 6px 10px;
            border: 1px solid #3d3d5c;
            border-radius: 6px;
            background: #1a1a2e;
            color: #e0e0e0;
            font-size: 0.85rem;
            width: 100px;
        }

        .color-picker-wrapper {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .color-picker {
            width: 36px;
            height: 36px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        .path-preview {
            background: #1a1a2e;
            border-radius: 8px;
            padding: 10px;
            height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .path-preview svg {
            width: 100%;
            height: 100%;
        }

        .info-text {
            color: #888;
            font-size: 0.85rem;
            margin-top: 10px;
        }

        @media (max-width: 1200px) {
            .main-layout {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1><i class="fas fa-bezier-curve"></i> SVG Path Editor</h1>
            <p class="subtitle">Visual SVG path builder and editor</p>
        </header>

        <div class="main-layout">
            <div class="canvas-section">
                <div class="canvas-header">
                    <span class="canvas-title"><i class="fas fa-draw-polygon"></i> Canvas</span>
                    <div class="canvas-tools">
                        <button class="tool-btn active" id="penTool" onclick="setTool('pen')">
                            <i class="fas fa-pen"></i> Pen
                        </button>
                        <button class="tool-btn" id="selectTool" onclick="setTool('select')">
                            <i class="fas fa-mouse-pointer"></i> Select
                        </button>
                        <button class="tool-btn" onclick="zoomIn()">
                            <i class="fas fa-search-plus"></i>
                        </button>
                        <button class="tool-btn" onclick="zoomOut()">
                            <i class="fas fa-search-minus"></i>
                        </button>
                        <button class="tool-btn" onclick="resetView()">
                            <i class="fas fa-expand"></i>
                        </button>
                    </div>
                </div>
                <div class="canvas-container">
                    <svg class="svg-canvas" id="svgCanvas" viewBox="0 0 800 500">
                        <defs>
                            <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
                                <path d="M 20 0 L 0 0 0 20" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="0.5"/>
                            </pattern>
                        </defs>
                        <rect width="100%" height="100%" fill="url(#grid)"/>
                        <g id="pathGroup"></g>
                        <g id="handlesGroup"></g>
                    </svg>
                </div>
            </div>

            <div class="sidebar">
                <div class="panel">
                    <div class="panel-title"><i class="fas fa-code"></i> Path Data</div>
                    <textarea class="path-input" id="pathInput" placeholder="Enter SVG path data or draw on canvas...&#10;Example: M 100 100 L 200 100 L 200 200 Z"></textarea>
                    <div class="btn-group" style="margin-top: 10px;">
                        <button class="btn btn-primary" onclick="applyPath()">
                            <i class="fas fa-sync"></i> Apply
                        </button>
                        <button class="btn btn-secondary" onclick="copyPath()">
                            <i class="fas fa-copy"></i> Copy
                        </button>
                        <button class="btn btn-secondary" onclick="downloadSVG()">
                            <i class="fas fa-download"></i> SVG
                        </button>
                    </div>
                </div>

                <div class="panel">
                    <div class="panel-title"><i class="fas fa-palette"></i> Style</div>
                    <div class="settings-row">
                        <span class="settings-label">Stroke</span>
                        <div class="color-picker-wrapper">
                            <input type="color" class="color-picker" id="strokeColor" value="#00d4ff" onchange="updateStyle()">
                            <input type="text" class="settings-input" id="strokeColorText" value="#00d4ff" style="width:80px" onchange="syncColor('stroke')">
                        </div>
                    </div>
                    <div class="settings-row">
                        <span class="settings-label">Fill</span>
                        <div class="color-picker-wrapper">
                            <input type="color" class="color-picker" id="fillColor" value="#7c3aed" onchange="updateStyle()">
                            <input type="text" class="settings-input" id="fillColorText" value="#7c3aed" style="width:80px" onchange="syncColor('fill')">
                        </div>
                    </div>
                    <div class="settings-row">
                        <span class="settings-label">Width</span>
                        <input type="number" class="settings-input" id="strokeWidth" value="2" min="0" max="20" onchange="updateStyle()">
                    </div>
                    <div class="settings-row">
                        <span class="settings-label">Opacity</span>
                        <input type="range" class="settings-input" id="fillOpacity" value="0.3" min="0" max="1" step="0.1" onchange="updateStyle()" style="width:100px">
                    </div>
                </div>

                <div class="panel">
                    <div class="panel-title"><i class="fas fa-shapes"></i> Presets</div>
                    <div class="presets">
                        <button class="preset-btn" onclick="loadPreset('rectangle')">
                            <div class="preset-icon"><i class="far fa-square"></i></div>
                            <div class="preset-name">Rect</div>
                        </button>
                        <button class="preset-btn" onclick="loadPreset('circle')">
                            <div class="preset-icon"><i class="far fa-circle"></i></div>
                            <div class="preset-name">Circle</div>
                        </button>
                        <button class="preset-btn" onclick="loadPreset('triangle')">
                            <div class="preset-icon"><i class="fas fa-play fa-rotate-270"></i></div>
                            <div class="preset-name">Triangle</div>
                        </button>
                        <button class="preset-btn" onclick="loadPreset('star')">
                            <div class="preset-icon"><i class="far fa-star"></i></div>
                            <div class="preset-name">Star</div>
                        </button>
                        <button class="preset-btn" onclick="loadPreset('heart')">
                            <div class="preset-icon"><i class="far fa-heart"></i></div>
                            <div class="preset-name">Heart</div>
                        </button>
                        <button class="preset-btn" onclick="loadPreset('arrow')">
                            <div class="preset-icon"><i class="fas fa-arrow-right"></i></div>
                            <div class="preset-name">Arrow</div>
                        </button>
                    </div>
                </div>

                <div class="panel">
                    <div class="panel-title"><i class="fas fa-list"></i> Points</div>
                    <div class="point-list" id="pointList">
                        <div class="empty-state">
                            <i class="fas fa-bezier-curve"></i>
                            <p>No points yet. Draw on canvas.</p>
                        </div>
                    </div>
                    <div class="btn-group" style="margin-top: 10px;">
                        <button class="btn btn-secondary" onclick="closePath()">
                            <i class="fas fa-compress"></i> Close
                        </button>
                        <button class="btn btn-danger" onclick="clearPath()">
                            <i class="fas fa-trash"></i> Clear
                        </button>
                    </div>
                </div>

                <div class="panel">
                    <div class="panel-title"><i class="fas fa-eye"></i> Preview</div>
                    <div class="path-preview" id="pathPreview">
                        <svg viewBox="0 0 100 100">
                            <path id="previewPath" d="" fill="#7c3aed" fill-opacity="0.3" stroke="#00d4ff" stroke-width="1"/>
                        </svg>
                    </div>
                    <p class="info-text" id="pathInfo">0 points</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentTool = 'pen';
        let pathData = '';
        let points = [];
        let scale = 1;
        let isDragging = false;
        let dragTarget = null;

        const pathGroup = document.getElementById('pathGroup');
        const handlesGroup = document.getElementById('handlesGroup');
        const pathInput = document.getElementById('pathInput');

        document.addEventListener('DOMContentLoaded', () => {
            loadFromStorage();
            renderPath();
            setupCanvasEvents();
        });

        function loadFromStorage() {
            const stored = localStorage.getItem('svg_path_editor_data');
            if (stored) {
                pathData = stored;
                pathInput.value = pathData;
                parsePath();
            }
        }

        function saveToStorage() {
            localStorage.setItem('svg_path_editor_data', pathData);
        }

        function setTool(tool) {
            currentTool = tool;
            document.querySelectorAll('.canvas-tools .tool-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(tool + 'Tool')?.classList.add('active');
        }

        function setupCanvasEvents() {
            const canvas = document.getElementById('svgCanvas');

            canvas.addEventListener('mousedown', (e) => {
                const rect = canvas.getBoundingClientRect();
                const x = ((e.clientX - rect.left) / rect.width) * 800;
                const y = ((e.clientY - rect.top) / rect.height) * 500;

                if (currentTool === 'pen' && !e.target.classList.contains('handle')) {
                    addPoint(x, y);
                }
            });

            canvas.addEventListener('mousemove', (e) => {
                if (isDragging && dragTarget !== null) {
                    const rect = canvas.getBoundingClientRect();
                    const x = ((e.clientX - rect.left) / rect.width) * 800;
                    const y = ((e.clientY - rect.top) / rect.height) * 500;
                    updatePointPosition(dragTarget, x, y);
                }
            });

            canvas.addEventListener('mouseup', () => {
                isDragging = false;
                dragTarget = null;
            });
        }

        function addPoint(x, y) {
            x = Math.round(x);
            y = Math.round(y);

            if (points.length === 0) {
                points.push({ type: 'M', x, y });
                pathData = `M ${x} ${y}`;
            } else {
                points.push({ type: 'L', x, y });
                pathData += ` L ${x} ${y}`;
            }

            pathInput.value = pathData;
            saveToStorage();
            renderPath();
        }

        function updatePointPosition(index, x, y) {
            if (points[index]) {
                points[index].x = Math.round(x);
                points[index].y = Math.round(y);
                rebuildPath();
                renderPath();
            }
        }

        function rebuildPath() {
            pathData = points.map(p => {
                if (p.type === 'M') return `M ${p.x} ${p.y}`;
                if (p.type === 'L') return `L ${p.x} ${p.y}`;
                if (p.type === 'Z') return 'Z';
                return '';
            }).join(' ');
            pathInput.value = pathData;
            saveToStorage();
        }

        function renderPath() {
            const strokeColor = document.getElementById('strokeColor').value;
            const fillColor = document.getElementById('fillColor').value;
            const strokeWidth = document.getElementById('strokeWidth').value;
            const fillOpacity = document.getElementById('fillOpacity').value;

            // Render main path
            if (pathData) {
                pathGroup.innerHTML = `<path d="${pathData}" fill="${fillColor}" fill-opacity="${fillOpacity}" stroke="${strokeColor}" stroke-width="${strokeWidth}" stroke-linecap="round" stroke-linejoin="round"/>`;
            } else {
                pathGroup.innerHTML = '';
            }

            // Render handles
            handlesGroup.innerHTML = '';
            points.forEach((p, i) => {
                if (p.type !== 'Z') {
                    const handle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
                    handle.setAttribute('cx', p.x);
                    handle.setAttribute('cy', p.y);
                    handle.setAttribute('r', '8');
                    handle.setAttribute('fill', p.type === 'M' ? '#00d4ff' : '#7c3aed');
                    handle.setAttribute('stroke', 'white');
                    handle.setAttribute('stroke-width', '2');
                    handle.setAttribute('class', 'handle');
                    handle.style.cursor = 'move';
                    handle.addEventListener('mousedown', (e) => {
                        e.stopPropagation();
                        isDragging = true;
                        dragTarget = i;
                    });
                    handlesGroup.appendChild(handle);
                }
            });

            // Update preview
            document.getElementById('previewPath').setAttribute('d', pathData || '');
            document.getElementById('previewPath').setAttribute('fill', fillColor);
            document.getElementById('previewPath').setAttribute('fill-opacity', fillOpacity);
            document.getElementById('previewPath').setAttribute('stroke', strokeColor);

            // Update info
            document.getElementById('pathInfo').textContent = `${points.length} points`;

            updatePointList();
        }

        function updatePointList() {
            const list = document.getElementById('pointList');

            if (points.length === 0) {
                list.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-bezier-curve"></i>
                        <p>No points yet. Draw on canvas.</p>
                    </div>
                `;
                return;
            }

            list.innerHTML = points.map((p, i) => `
                <div class="point-item">
                    <div class="point-info">
                        <span class="point-type">${p.type}</span>
                        <span class="point-coords">${p.type !== 'Z' ? `${p.x}, ${p.y}` : '-'}</span>
                    </div>
                    <div class="point-actions">
                        <button onclick="removePoint(${i})" title="Remove">
                            <i class="fas fa-times"></i>
                        </button>
                    </div>
                </div>
            `).join('');
        }

        function applyPath() {
            pathData = pathInput.value.trim();
            parsePath();
            saveToStorage();
            renderPath();
        }

        function parsePath() {
            points = [];
            const commands = pathData.match(/[MLHVCSQTAZ][^MLHVCSQTAZ]*/gi) || [];

            let currentX = 0, currentY = 0;

            commands.forEach(cmd => {
                const type = cmd[0].toUpperCase();
                const args = cmd.slice(1).trim().split(/[\s,]+/).map(Number).filter(n => !isNaN(n));

                switch (type) {
                    case 'M':
                        currentX = args[0] || 0;
                        currentY = args[1] || 0;
                        points.push({ type: 'M', x: currentX, y: currentY });
                        break;
                    case 'L':
                        currentX = args[0] || currentX;
                        currentY = args[1] || currentY;
                        points.push({ type: 'L', x: currentX, y: currentY });
                        break;
                    case 'H':
                        currentX = args[0] || currentX;
                        points.push({ type: 'L', x: currentX, y: currentY });
                        break;
                    case 'V':
                        currentY = args[0] || currentY;
                        points.push({ type: 'L', x: currentX, y: currentY });
                        break;
                    case 'C':
                        currentX = args[4] || currentX;
                        currentY = args[5] || currentY;
                        points.push({ type: 'C', x: currentX, y: currentY });
                        break;
                    case 'Z':
                        points.push({ type: 'Z' });
                        break;
                }
            });
        }

        function removePoint(index) {
            points.splice(index, 1);
            if (points.length > 0 && points[0].type !== 'M') {
                points[0].type = 'M';
            }
            rebuildPath();
            saveToStorage();
            renderPath();
        }

        function closePath() {
            if (points.length > 2 && !pathData.includes('Z')) {
                points.push({ type: 'Z' });
                pathData += ' Z';
                pathInput.value = pathData;
                saveToStorage();
                renderPath();
            }
        }

        function clearPath() {
            if (confirm('Clear all points?')) {
                points = [];
                pathData = '';
                pathInput.value = '';
                saveToStorage();
                renderPath();
            }
        }

        function copyPath() {
            navigator.clipboard.writeText(pathData).then(() => {
                showToast('Path copied to clipboard!');
            });
        }

        function downloadSVG() {
            const strokeColor = document.getElementById('strokeColor').value;
            const fillColor = document.getElementById('fillColor').value;
            const strokeWidth = document.getElementById('strokeWidth').value;
            const fillOpacity = document.getElementById('fillOpacity').value;

            const svg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
    <path d="${pathData}" fill="${fillColor}" fill-opacity="${fillOpacity}" stroke="${strokeColor}" stroke-width="${strokeWidth}"/>
</svg>`;

            const blob = new Blob([svg], { type: 'image/svg+xml' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'path.svg';
            a.click();
            URL.revokeObjectURL(url);
        }

        function updateStyle() {
            document.getElementById('strokeColorText').value = document.getElementById('strokeColor').value;
            document.getElementById('fillColorText').value = document.getElementById('fillColor').value;
            renderPath();
        }

        function syncColor(type) {
            if (type === 'stroke') {
                document.getElementById('strokeColor').value = document.getElementById('strokeColorText').value;
            } else {
                document.getElementById('fillColor').value = document.getElementById('fillColorText').value;
            }
            renderPath();
        }

        function zoomIn() {
            scale *= 1.2;
            updateViewBox();
        }

        function zoomOut() {
            scale /= 1.2;
            updateViewBox();
        }

        function resetView() {
            scale = 1;
            document.getElementById('svgCanvas').setAttribute('viewBox', '0 0 800 500');
        }

        function updateViewBox() {
            const w = 800 / scale;
            const h = 500 / scale;
            const x = (800 - w) / 2;
            const y = (500 - h) / 2;
            document.getElementById('svgCanvas').setAttribute('viewBox', `${x} ${y} ${w} ${h}`);
        }

        function loadPreset(type) {
            const presets = {
                rectangle: 'M 100 100 L 300 100 L 300 250 L 100 250 Z',
                circle: 'M 200 80 C 276 80 320 124 320 175 C 320 226 276 270 200 270 C 124 270 80 226 80 175 C 80 124 124 80 200 80 Z',
                triangle: 'M 200 80 L 320 260 L 80 260 Z',
                star: 'M 200 60 L 235 150 L 330 150 L 255 210 L 280 300 L 200 245 L 120 300 L 145 210 L 70 150 L 165 150 Z',
                heart: 'M 200 280 C 150 230 60 170 60 110 C 60 60 110 40 150 40 C 175 40 200 60 200 80 C 200 60 225 40 250 40 C 290 40 340 60 340 110 C 340 170 250 230 200 280 Z',
                arrow: 'M 60 200 L 260 200 L 260 140 L 360 220 L 260 300 L 260 240 L 60 240 Z'
            };

            pathData = presets[type] || '';
            pathInput.value = pathData;
            parsePath();
            saveToStorage();
            renderPath();
        }

        function showToast(message) {
            const toast = document.createElement('div');
            toast.style.cssText = `
                position: fixed;
                bottom: 20px;
                right: 20px;
                background: linear-gradient(135deg, #00d4ff, #7c3aed);
                color: white;
                padding: 12px 24px;
                border-radius: 8px;
                font-weight: 500;
                z-index: 2000;
            `;
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2000);
        }
    </script>

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'projects/**'
      - 'index.html'
      - 'sitemap.xml'
      - 'robots.txt'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Build site structure
        run: |
          mkdir -p _site
          # Copy root redirect
          cp index.html _site/
          # Copy SEO files
          cp sitemap.xml _site/
          cp robots.txt _site/
          # Copy all calculator tools
          cp projects/*.html _site/
          # Copy NoMoreZoomFatigue (Meeting Tax Calculator)
          cp -r projects/nomorezoomfatigue-validation/public/* _site/ 2>/dev/null || true
          # List what we're deploying
          echo "Deploying:"
          ls -la _site/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

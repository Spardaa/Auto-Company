name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'tools/**'
      - 'index.html'
      - 'tools-index.json'
      - 'sitemap.xml'
      - 'robots.txt'
      - 'css/**'
      - 'js/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: {{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Build site structure
        run: |
          mkdir -p _site/tools
          # Copy main files
          cp index.html _site/
          cp tools-index.json _site/
          cp sitemap.xml _site/ 2>/dev/null || true
          cp robots.txt _site/ 2>/dev/null || true
          # Copy all developer tools
          cp tools/*.html _site/tools/ 2>/dev/null || true
          # Copy CSS and JS
          cp -r css _site/ 2>/dev/null || true
          cp -r js _site/ 2>/dev/null || true
          # List what we're deploying
          echo " Deploying:
